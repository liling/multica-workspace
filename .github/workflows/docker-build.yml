name: Build and Push Docker Image

# 在推送到默认分支（main）时，构建多架构镜像并推送到 GitHub Container Registry (GHCR)，
# 推送 latest 浮动 tag。
#
# 注意：此前曾在此处加过 actions/delete-package-versions 的 prune 步骤
# （min-versions-to-keep: 3）。该步骤在多架构 + SLSA attestation 场景下会删除
# 镜像 manifest（amd64/arm64），但保留 index 与 attestation，导致 :latest
# 变成“悬空 tag”——pull 时报 “manifest unknown”。因此这里**移除 prune 步骤**，
# 让每次 push 都重新推一份完整、可拉的 :latest。
"on":
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 需要 packages:write 才能推送 GHCR 镜像
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # 复用 BuildKit 在 GitHub Actions 上的缓存后端（MEM-9）：
          # 未改动的层（apt 基础依赖、pi/hermes/multica 安装、
          # gstack 的 Bun/Playwright Chromium 下载等）直接从缓存命中，
          # 只重跑真正变化的部分，把“小调整也要十几分钟”压缩到几分钟以内。
          # mode=max 缓存全部中间层，最大化命中率；缓存受 GitHub 7 天 TTL 约束，
          # 到期或改了 Dockerfile 后会自动重新拉取各 CLI 的最新版本。
          cache-from: type=gha
          cache-to: type=gha,mode=max
