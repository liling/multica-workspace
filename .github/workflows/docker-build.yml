name: Build and Push Docker Image

# 在推送到默认分支（main）时，构建多架构镜像并推送到 GitHub Container Registry (GHCR)，
# 推送 latest 浮动 tag 以及按 commit 短 sha 的不可变 tag，最后清理老版本。
#
# 历史注记：早期只用 :latest 浮动 tag，曾在此处加过 actions/delete-package-versions
# 的 prune 步骤（min-versions-to-keep: 3）。该步骤在多架构 + SLSA attestation 场景下
# 会删除镜像 manifest（amd64/arm64），但保留 index 与 attestation，导致 :latest
# 变成“悬空 tag”——pull 时报 “manifest unknown”。因此当时**移除 prune 步骤**。
#
# 现在（MEM-17）：参照 liling/hindsight 的 build-custom.yml，把打 tag 方式改成
#   :latest + :${{ github.sha }}
# 这样每次 push 至少推 2 个 tag，老 commit 的具体 sha 仍能引到对应 manifest，
# 再结合下面的 prune step（保留最近 KEEP=10 个 version，跳过任何挂着 :latest 的
# version）就能持续把历史压住，同时不会让 :latest 变悬空。
"on":
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 需要 packages:write 才能推送 GHCR 镜像；
# prune step 还需要 list/delete 包版本，对 workflow 自身 repo，packages:write 即够。
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # :latest 浮动 + 不可变 short-sha tag，并行见 MEM-17。
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          # 复用 BuildKit 在 GitHub Actions 上的缓存后端（MEM-9）：
          # 未改动的层（apt 基础依赖、pi/hermes/multica 安装、
          # pi 扩展 npm 包下载等）直接从缓存命中，
          # 只重跑真正变化的部分，把“小调整也要十几分钟”压缩到几分钟以内。
          # mode=max 缓存全部中间层，最大化命中率；缓存受 GitHub 7 天 TTL 约束，
          # 到期或改了 Dockerfile 后会自动重新拉取各 CLI 的最新版本。
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 参照 liling/hindsight 的 build-custom.yml 做老版本回收。
      # 关键护栏：对每个候选 version，先查它身上的 tags 列表，
      # 若 `latest` 在里面就跳过，避免 :latest 变成悬空 tag。
      # 端点说明：REST API 在 user / org namespace 下分别是
      #   user/packages/container/{pkg}/versions
      #   orgs/{org}/packages/container/{pkg}/versions
      # 其中 {pkg} 是 *basename*（不含“owner/” 前缀）。
      # 之前版本错误地把 "${{ github.repository }}"（例如 “liling/multica-workspace”）
      # 直接拼到路径里，变成了 user/packages/container/liling/multica-workspace/versions
      # —— GHCR 上根本没这条路径，永远 404，run 都失败。
      # 这里显式抽出 basename，并按 owner 是 user 还是 org 二选一 endpoint。
      - name: Prune old GHCR package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          KEEP: '10'
        run: |
          set -u
          PACKAGE="${REPOSITORY##*/}"   # strip "owner/" prefix → basename
          echo "Pruning ${REPOSITORY} (package=${PACKAGE}, owner=${OWNER}, KEEP=${KEEP})"

          # 探测 owner type：user vs org。先看一下 repos endpoint（不会真的读包内容，
          # 只是拿仓库 metadata），用 owner 字段的 type 决定后续 endpoint 前缀。
          OWNER_TYPE=$(gh api "repos/${OWNER}/${PACKAGE}" -q '.owner.type' 2>/dev/null || echo "User")
          if [ -z "$OWNER_TYPE" ]; then OWNER_TYPE="User"; fi
          echo "Detected owner type: ${OWNER_TYPE}"

          # 按 owner_type 选 endpoint 前缀；basename 形式避免路径重复 owner。
          if [ "$OWNER_TYPE" = "Organization" ]; then
            PREFIX="orgs/${OWNER}/packages/container"
          else
            PREFIX="user/packages/container"
          fi
          echo "Using endpoint prefix: ${PREFIX}"

          # 1) 拿全部 version id（API 默认按 created_at desc 排序，正好“留最新 N”）
          # 注意：--paginate --slurp 会把每一页的 JSON（本身是个数组）再塞进
          # 顶层数组里，结果是 array-of-arrays，形如 [[v1,v2],[v3,v4]]。
          # 所以提取 id 要先展开一层：.[][].id，直接写 .[].id 会对内层数组
          # 取 .id 报 "Cannot index array with string \"id\""，整个 prune step 挂掉。
          VERSIONS_JSON=$(gh api "${PREFIX}/${PACKAGE}/versions?per_page=100" --paginate --slurp)
          VERSION_IDS=$(printf '%s' "$VERSIONS_JSON" | jq -r '.[][].id')
          TOTAL=$(printf '%s\n' "$VERSION_IDS" | grep -c .)
          echo "Found $TOTAL versions on ${PACKAGE} (KEEP=${KEEP})"
          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Nothing to clean up"; exit 0
          fi

          # 2) 留最新 KEEP 个，其余逐个处理；保护任何挂着 :latest 的 version
          printf '%s\n' "$VERSION_IDS" | tail -n +$((KEEP + 1)) | while read -r vid; do
            [ -z "$vid" ] && continue
            TAGS_JSON=$(gh api "${PREFIX}/${PACKAGE}/versions/${vid}" \
                        -q '.metadata.container.tags // []')
            TAGS=$(printf '%s' "$TAGS_JSON" | jq -r '.[]' 2>/dev/null || true)
            if printf '%s\n' "$TAGS" | grep -qx 'latest'; then
              echo "Skip version $vid (carries :latest tag)"
              continue
            fi
            echo "Deleting version $vid (tags: $(printf '%s,' $TAGS | sed 's/,$//'))"
            gh api -X DELETE "${PREFIX}/${PACKAGE}/versions/${vid}" || \
              echo "  -> delete failed for $vid (continuing)"
          done
          echo "Prune step done"

