name: Build and Push Docker Image

# 在推送到默认分支（main）时，构建多架构镜像并推送到 GitHub Container Registry (GHCR)，
# 推送 latest 浮动 tag。
#
# 注意：此前曾在此处加过 actions/delete-package-versions 的 prune 步骤
# （min-versions-to-keep: 3）。该步骤在多架构 + SLSA attestation 场景下会删除
# 镜像 manifest（amd64/arm64），但保留 index 与 attestation，导致 :latest
# 变成“悬空 tag”——pull 时报 “manifest unknown”。因此这里**移除 prune 步骤**，
# 让每次 push 都重新推一份完整、可拉的 :latest。
"on":
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 需要 packages:write 才能推送 GHCR 镜像
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
